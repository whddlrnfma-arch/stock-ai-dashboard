<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="키움증권 연동 주식 자동매매 퀀트 트레이딩 터미널 대시보드" />
  <title>QuantTerminal — 자동매매 대시보드</title>

  <!-- Google Fonts: Inter (CDN 임베드 — 로컬 폰트 설치 불필요) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet"
    media="print"
    onload="this.media='all'"
  />
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </noscript>

  <link rel="stylesheet" href="style.css?v=2.0" />
</head>
<body>

  <!-- ====================================================
       APP SHELL: 전체 화면을 감싸는 루트 컨테이너
  ===================================================== -->
  <div id="app-shell">

    <!-- ── HEADER: 상단 타이틀바 & 시스템 상태 ── -->
    <header id="app-header" role="banner">
      <div class="header-left">
        <div class="app-logo" aria-label="QuantTerminal 로고">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M11 2L3 6.5V15.5L11 20L19 15.5V6.5L11 2Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            <path d="M11 7V15M7.5 9L11 7L14.5 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="app-title-group">
          <h1 class="app-title">QuantTerminal</h1>
          <span class="app-subtitle">Kiwoom Open API — Live</span>
        </div>
      </div>

      <div class="header-center">
        <!-- STEP 2에서 탭 UI가 이 자리에 삽입됩니다 -->
        <nav id="main-tab-nav" role="tablist" aria-label="매매 전략 탭"></nav>
      </div>

      <div class="header-right">
        <!-- 시스템 상태 인디케이터 -->
        <div class="system-status" id="system-status">
          <span class="status-dot status-dot--live" aria-hidden="true"></span>
          <span class="status-label">시스템 정상</span>
        </div>
        <!-- 실시간 시각 -->
        <div class="live-clock" id="live-clock" aria-live="polite" aria-atomic="true">
          <span id="clock-display">00:00:00</span>
        </div>
        <!-- 설정 버튼 -->
        <button class="icon-btn" id="btn-settings" aria-label="설정 열기" title="설정">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="9" cy="9" r="3" stroke="currentColor" stroke-width="1.6"/>
            <path d="M9 1v2M9 15v2M1 9h2M15 9h2M3.22 3.22l1.41 1.41M13.36 13.36l1.41 1.41M3.22 14.78l1.41-1.41M13.36 4.64l1.41-1.41" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- ── MAIN CONTENT: 좌/우 2-Column 분할 레이아웃 ── -->
    <main id="app-main" role="main">

      <!-- 좌측 패널: 종목 리스트 -->
      <section id="panel-left" class="panel" aria-label="종목 리스트 패널">
        <!-- 패널 헤더: 검색/필터 컨트롤 영역 -->
        <div class="panel-header">
          <div class="panel-title-row">
            <h2 class="panel-title">종목 리스트</h2>
            <span class="badge-count" id="stock-count-badge" aria-live="polite">0</span>
          </div>
          <div class="panel-controls">
            <div class="search-box" role="search">
              <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.5"/>
                <path d="M9.5 9.5L12.5 12.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
              <input type="search" id="stock-search-input" placeholder="종목명 · 코드 검색" aria-label="종목명 또는 코드 검색" autocomplete="off" />
            </div>
            <div class="sort-controls">
              <button class="sort-btn sort-btn--active" id="sort-strength" data-sort="strength" aria-pressed="true">강도순</button>
              <button class="sort-btn" id="sort-change" data-sort="change" aria-pressed="false">등락순</button>
            </div>
          </div>
        </div>

        <!-- 종목 카드 스크롤 컨테이너 -->
        <div class="panel-scroll-area" id="stock-list-container" role="list" aria-label="종목 카드 목록">
          <!-- STEP 2에서 종목 카드(.stock-card)들이 JS로 동적 생성됩니다 -->
          <div class="empty-state" id="empty-state-stocks" aria-live="polite">
            <div class="empty-state-icon" aria-hidden="true">📡</div>
            <p class="empty-state-title">데이터 수신 대기 중</p>
            <p class="empty-state-desc">키움 API 연결 후 종목이 표시됩니다.</p>
          </div>
        </div>

        <!-- 패널 푸터: 요약 통계 -->
        <footer class="panel-footer" aria-label="종목 요약 통계">
          <div class="summary-stat">
            <span class="summary-label">활성</span>
            <span class="summary-value summary-value--up" id="stat-active">0</span>
          </div>
          <div class="summary-divider" aria-hidden="true"></div>
          <div class="summary-stat">
            <span class="summary-label">대기</span>
            <span class="summary-value summary-value--neutral" id="stat-cached">0</span>
          </div>
          <div class="summary-divider" aria-hidden="true"></div>
          <div class="summary-stat">
            <span class="summary-label">평균 강도</span>
            <span class="summary-value" id="stat-avg-strength">—</span>
          </div>
        </footer>
      </section>

      <!-- 우측 패널: 글로벌 뉴스 & 인디케이터 -->
      <aside id="panel-right" class="panel" aria-label="글로벌 뉴스 및 시장 인디케이터 패널">
        <!-- 글로벌 뉴스 섹션 -->
        <section class="right-section" id="section-news" aria-labelledby="news-heading">
          <div class="section-header">
            <h2 class="section-title" id="news-heading">글로벌 뉴스</h2>
            <div class="section-meta">
              <span class="update-badge" id="news-update-time" aria-live="polite">갱신 대기 중</span>
              <button class="icon-btn icon-btn--sm" id="btn-refresh-news" aria-label="뉴스 새로고침" title="뉴스 새로고침">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <path d="M12.5 2.5A6 6 0 0 0 1.5 7M1.5 11.5A6 6 0 0 0 12.5 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                  <path d="M10.5 1L12.5 2.5L11 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M3.5 13L1.5 11.5L3 9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
          </div>
          <!-- 뉴스 아이템 리스트 컨테이너 -->
          <div class="news-list" id="news-list-container" role="list" aria-label="글로벌 뉴스 목록">
            <!-- STEP 3에서 뉴스 아이템(.news-item)들이 JS로 동적 생성됩니다 -->
          </div>
        </section>

        <!-- 시장 인디케이터 섹션 -->
        <section class="right-section" id="section-indicators" aria-labelledby="indicators-heading">
          <div class="section-header">
            <h2 class="section-title" id="indicators-heading">시장 인디케이터</h2>
          </div>
          <div class="indicators-grid" id="indicators-grid">
            <!-- 인디케이터 카드 (JS 또는 정적) -->
            <div class="indicator-card" data-indicator="kospi">
              <span class="indicator-name">KOSPI</span>
              <span class="indicator-value numeric" id="ind-kospi-val">—</span>
              <span class="indicator-change numeric" id="ind-kospi-chg">—</span>
            </div>
            <div class="indicator-card" data-indicator="kosdaq">
              <span class="indicator-name">KOSDAQ</span>
              <span class="indicator-value numeric" id="ind-kosdaq-val">—</span>
              <span class="indicator-change numeric" id="ind-kosdaq-chg">—</span>
            </div>
            <div class="indicator-card" data-indicator="usdkrw">
              <span class="indicator-name">USD/KRW</span>
              <span class="indicator-value numeric" id="ind-usdkrw-val">—</span>
              <span class="indicator-change numeric" id="ind-usdkrw-chg">—</span>
            </div>
            <div class="indicator-card" data-indicator="vix">
              <span class="indicator-name">VIX</span>
              <span class="indicator-value numeric" id="ind-vix-val">—</span>
              <span class="indicator-change numeric" id="ind-vix-chg">—</span>
            </div>
          </div>
        </section>

        <!-- 테마 히트맵 섹션 -->
        <section class="right-section" id="section-themes" aria-labelledby="themes-heading">
          <div class="section-header">
            <h2 class="section-title" id="themes-heading">테마 히트맵</h2>
          </div>
          <div class="theme-heatmap" id="theme-heatmap-container">
            <!-- JS로 동적 생성 -->
          </div>
        </section>
      </aside>

    </main>

  </div><!-- /#app-shell -->

  <!-- ====================================================
       MODAL: 종목 상세 정보 (STEP 4에서 완성)
  ===================================================== -->
  <div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-stock-name" hidden>
    <div id="modal-card" class="modal-card">
      <div class="modal-header">
        <div class="modal-title-group">
          <h2 class="modal-stock-name" id="modal-stock-name">—</h2>
          <span class="modal-stock-code numeric" id="modal-stock-code">—</span>
        </div>
        <div class="modal-header-right">
          <div class="modal-price-group">
            <span class="modal-price numeric" id="modal-current-price">—</span>
            <span class="modal-price-change numeric" id="modal-price-change">—</span>
          </div>
          <button class="icon-btn modal-close-btn" id="btn-modal-close" aria-label="모달 닫기">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M4 4L14 14M14 4L4 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="modal-body">
        <!-- 좌측: 차트 뷰 -->
        <div class="modal-chart-panel" id="modal-chart-panel">
          <!-- STEP 4에서 차트 탭 + 플레이스홀더 삽입 -->
        </div>
        <!-- 우측: 호가창 뷰 -->
        <div class="modal-orderbook-panel" id="modal-orderbook-panel">
          <!-- STEP 4에서 호가창 테이블 삽입 -->
        </div>
      </div>
    </div>
  </div><!-- /#modal-overlay -->

  <!-- 실시간 시계 & 초기화 스크립트 (STEP 2~4에서 JS 파일로 확장) -->
  <script>
    // 실시간 시계
    (function initClock() {
      const display = document.getElementById('clock-display');
      if (!display) return;
      function tick() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        display.textContent = `${h}:${m}:${s}`;
      }
      tick();
      setInterval(tick, 1000);
    })();
  </script>
  <script src="app.js?v=2.0" defer></script>

</body>
</html>
